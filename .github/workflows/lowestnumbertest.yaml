name: Test find_lowest_number.py
on: [push]
jobs:
  find_lowest_number_output_comparison:
    name: automated_test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-verison: "3.10"

    - name: Produce regular use case outputs
      run: python find_lowest_number test_data/test1_input.txt test_data/test1_output.txt
    - name: Test regular use case
      run: diff test_data/test1_output.txt test_data/test1_expected.txt

    - name: Produce single line input case outputs
      run: python find_lowest_number test_data/test2_input.txt test_data/test2_output.txt
    - name: Test single line input case
      run: diff test_data/test2_output.txt test_data/test2_expected.txt
      
    - name: Produce regular use case outputs
      run: python find_lowest_number test_data/test3_input.txt test_data/test3_output.txt
    - name: Test regular use case
      run: diff test_data/test3_output.txt test_data/test3_expected.txt
      
